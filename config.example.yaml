email_domain: example.com

# SQLite 状态库路径；留空则使用运行目录下 data/gitmail.db
database_path: ""

# 日志根目录；留空则使用运行目录下 logs（按 年-月-日/时-分-秒/ 分文件）
log_dir: ""

# 监听端口；0 表示随机空闲端口
listen_port: 0

# 对外 URL 前缀，经 80 端口反向代理子路径访问时填写，如 /tools/gitmail
public_base_path: ""

allow_anonymous_repo_list: true
poll_interval_seconds: 120
manifest_refresh_seconds: 300
# 并行 git 操作上限；仓库多或机器卡顿时可调为 2～4
fetch_concurrency: 4
# 无变更时先 ls-remote 探测，跳过 fetch，降低磁盘与网络压力
remote_probe_before_fetch: true
frontend_poll_seconds: 30

# 启动时向 SMTP 账号发送自检邮件；false 则跳过
smtp_startup_check: true
# 启动时调用一次最小 AI 对话验证连通性；false 则跳过
ai_startup_check: true

# 反向代理场景下用于取真实客户端 IP 的头名
trusted_proxy_header: ""

ip_whitelist:
  - 127.0.0.1
  - 192.168.*

# IP 或网段到用户名的映射（覆盖 avahi / nmblookup 解析结果）
ip_user_map: {}

# 从解析出的用户名中提取真正的邮箱前缀；第一个匹配的正则生效。
# 有捕获组时使用第一个非空捕获组；没有捕获组时使用整个匹配结果。
# 留空或都不匹配时使用原用户名。
username_extract_regexes: []
# username_extract_regexes:
#   - "^([^-]+)-"

projects:
  - name: demo
    workspace: /path/to/repo/workspace
    gerrit_base_url: http://review.example.com
