<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitMail</title>
    <script>
      (function () {
        var s = localStorage.getItem("gitmail-style") || "github";
        var c = localStorage.getItem("gitmail-scheme") || "light";
        var r = document.documentElement;
        r.dataset.appStyle = s;
        r.dataset.appScheme = c;
        r.dataset.appSchemeGuard = c;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
